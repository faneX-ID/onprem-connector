name: PR Validation

on:
  workflow_call:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: read
  actions: read
  issues: write

jobs:
  validate:
    name: "🛡️ Security & Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Tools
        run: |
          pip install bandit black isort flake8

      - name: 🔒 Security Scan
        run: |
          bandit -r . -f custom || true

      - name: 🎨 Code Style Check (Black)
        run: |
          black --check --diff . || echo "⚠️ Code formatting issues found. Run 'black .' to fix."

      - name: 🎨 Import Sorting Check (isort)
        run: |
          isort --check --diff . || echo "⚠️ Import sorting issues found. Run 'isort .' to fix."

      - name: 📝 Lint Check (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: ⚙️ Validate Config
        run: |
          if [ ! -f "config.ini.example" ]; then
            echo "❌ config.ini.example not found"
            exit 1
          fi
          python3 << EOF
          import configparser
          import sys

          config = configparser.ConfigParser()
          try:
              config.read('config.ini.example')
              required_sections = ['connector', 'cloud', 'network', 'security', 'logging']
              missing = [s for s in required_sections if s not in config.sections()]
              if missing:
                  print(f"❌ Missing sections: {missing}")
                  sys.exit(1)
              print("✅ All required sections present")
          except Exception as e:
              print(f"❌ Error reading config: {e}")
              sys.exit(1)
          EOF

  test:
    name: "🐍 Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Tests
        env:
          TEST_MODE: "true"
        run: |
          pytest tests/ -v --tb=short || echo "⚠️ Tests failed or no tests found"

  feedback:
    needs: [validate, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Determine Status
        id: status
        run: |
          if [[ "${{ needs.validate.result }}" == "success" && "${{ needs.test.result }}" == "success" ]]; then
            echo "RESULT=success" >> $GITHUB_OUTPUT
          else
            echo "RESULT=failure" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: steps.status.outputs.RESULT == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const failedJobs = [];
            if ('${{ needs.validate.result }}' === 'failure') failedJobs.push('Security & Validation checks');
            if ('${{ needs.test.result }}' === 'failure') failedJobs.push('Tests');

            const body = `❌ **PR Validation Failed**

            The following checks failed: ${failedJobs.join(', ')}.

            Please review the logs and fix the issues before merging.

            **Suggested Actions:**
            1. Run \`black .\` to fix code formatting
            2. Run \`isort .\` to fix import sorting
            3. Run \`pytest\` locally to verify tests pass
            4. Review security scan results`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Comment on PR (Success)
        if: steps.status.outputs.RESULT == 'success'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `✅ **PR Validation Passed!**

            All checks passed successfully. Ready for review.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
