name: Docker CI

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'

concurrency:
  group: docker-ci-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: fanexid-connector:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker Image
        run: |
          # Create test config
          mkdir -p test-config
          cp config.ini.example test-config/config.ini || echo "config.ini.example not found, using defaults"

          # Run container
          docker run -d --name connector-test \
            -p 8080:8080 \
            -v $(pwd)/test-config:/app/config \
            fanexid-connector:test || exit 1

          # Wait for startup
          sleep 5

          # Test health endpoint
          curl -f http://localhost:8080/health || exit 1

          # Cleanup
          docker stop connector-test
          docker rm connector-test
